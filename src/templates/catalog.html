<!doctype html>
<html lang="zh-CN" data-theme="{{THEME}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>目录</title>
    <style>
      {{THEME_STYLE}}
      p{text-indent:10px;}
      a{font-family:SimHei;font-size:20px;letter-spacing:1px;text-decoration:none;}
      .pagination {
        margin: 10px 0;
        text-align: center;
      }
      .pagination a, .pagination input, .pagination button {
        margin: 0 5px;
        padding: 5px 10px;
        font-size: 18px;
        border: 1px solid #ccc;
        border-radius: 4px;
        height: 30px;
        vertical-align: middle;
      }
      .pagination input {
        width: 40px;
        text-align: center;
      }
      .pagination .disabled {
        color: #999;
        pointer-events: none;
      }
      #theme-popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid #ccc;
        padding: 0;
        display: none;
        z-index: 1000;
        text-align: center;
        box-sizing: border-box;
      }
      .theme-option {
        width: 40px;
        height: 40px;
        display: inline-block;
        margin: 0 5px;
        position: relative;
        cursor: pointer;
        border: 1px solid #ccc;
        vertical-align: top;
      }
      .theme-option::before {
        content: attr(data-check);
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12px;
        color: red;
      }
    </style>
  </head>
  <body>
    <div id="theme-popup">{{THEME_OPTIONS}}</div>
    <div align="center">{{OVERVIEW_PAGE}}</div>
    <div align="left">
      <h2>{{STORY_NAME}}</h2>
      {{STORY_CATALOG}}
    </div>
    <div class="pagination">
      <a
        href="/r/{{NAMESPACE}}/cat/{{STORY_ID}}?p=1&theme={{THEME}}"
        title="首页"
        class="{{FIRST_DISABLED}}"
        >«</a
      >
      <a
        href="/r/{{NAMESPACE}}/cat/{{STORY_ID}}?p={{PREV_PAGE}}&theme={{THEME}}"
        title="上一页"
        class="{{PREV_DISABLED}}"
        >‹</a
      >
      <input
        type="text"
        id="pageInput"
        value="{{CURRENT_PAGE}}"
        min="1"
        max="{{TOTAL_PAGES}}"
        inputmode="numeric"
        pattern="[0-9]*"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        style="width: 40px; background-color: {{INPUT_BG_COLOR}}; color: {{INPUT_TEXT_COLOR}};"
      />
      <a href="javascript:goToPage()">Go</a>
      <a
        href="/r/{{NAMESPACE}}/cat/{{STORY_ID}}?p={{NEXT_PAGE}}&theme={{THEME}}"
        title="下一页"
        class="{{NEXT_DISABLED}}"
        >›</a
      >
      <a
        href="/r/{{NAMESPACE}}/cat/{{STORY_ID}}?p={{TOTAL_PAGES}}&theme={{THEME}}"
        title="尾页"
        class="{{LAST_DISABLED}}"
        >»</a
      >
    </div>
    <script>
      function setupThemePopup() {
        if (window.themePopupInitialized) return;
        window.themePopupInitialized = true;

        const themePopup = document.getElementById('theme-popup');
        let popupVisible = false;

        function togglePopup() {
          popupVisible = !popupVisible;
          themePopup.style.display = popupVisible ? 'block' : 'none';
        }

        function hidePopup() {
          popupVisible = false;
          themePopup.style.display = 'none';
        }

        document.addEventListener('dblclick', function (e) {
          const target = e.target;
          if (themePopup.contains(target)) return;
          if (
            target.tagName === 'A' &&
            target.getAttribute('href') &&
            (target.getAttribute('href').startsWith('/') ||
              target.getAttribute('href').startsWith('javascript'))
          ) {
            if (popupVisible) hidePopup();
            return;
          }
          if (popupVisible) {
            hidePopup();
            return;
          }
          togglePopup();
        });
      }

      document.addEventListener('DOMContentLoaded', function () {
        setupThemePopup();
        const urlParams = new URLSearchParams(window.location.search);
        const currentTheme = urlParams.get('theme') || 'default';
        document.querySelectorAll('.theme-option').forEach(function (option) {
          const theme = option.getAttribute('data-theme');
          if (theme === currentTheme) option.setAttribute('data-check', '✔');
          option.setAttribute('href', '?p={{CURRENT_PAGE}}&theme=' + theme);
        });
      });

      function goToPage() {
        const input = document.getElementById('pageInput');
        const page = parseInt(input.value);
        const max = parseInt(input.max);
        const safePage = Math.max(1, Math.min(page, max));
        const url = new URL(window.location.href);
        url.searchParams.set('p', safePage);
        window.location.href = url.toString();
      }

      document.getElementById('pageInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') goToPage();
      });
    </script>
  </body>
</html>
